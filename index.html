<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>방송 스케줄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ======================================================
     ⚙️ 여기 두 줄만 본인 정보로 바꿔주세요
     ====================================================== */
</style>
</head>
<body>

<!-- ======================================================
     ⚙️ 설정: 본인의 캘린더 ID / API 키를 아래 <script> 안에 입력하세요
     아래 CONFIG 부분만 수정하면 됩니다. (자세한 설명은 채팅 답변 참고)
     ====================================================== -->

<div id="app">
  <header class="board-header">
    <div class="onair-badge" id="onairBadge">
      <span class="onair-dot"></span>
      <span class="onair-text">ON AIR</span>
    </div>
    <h1 class="board-title">STREAM SCHEDULE</h1>
    <div class="board-nav">
      <button id="prevBtn" class="nav-btn" aria-label="이전 달">‹</button>
      <div class="month-label" id="monthLabel">2026 . 07</div>
      <button id="nextBtn" class="nav-btn" aria-label="다음 달">›</button>
    </div>
  </header>

  <div id="statusMsg" class="status-msg"></div>

  <div class="calendar-wrap">
    <div class="weekday-row">
      <div class="weekday">일</div>
      <div class="weekday">월</div>
      <div class="weekday">화</div>
      <div class="weekday">수</div>
      <div class="weekday">목</div>
      <div class="weekday">금</div>
      <div class="weekday">토</div>
    </div>
    <div class="grid" id="calendarGrid"></div>
  </div>

  <div class="legend">
    <span class="legend-dot"></span> 방송 예정 &nbsp;&nbsp;
    <span class="legend-today"></span> 오늘
  </div>

  <footer class="board-footer">Powered by Google Calendar · Last sync <span id="syncTime">-</span></footer>
</div>

<style>
  /* ============ 디자인 토큰 ============ */
  :root{
    --bg: #14151A;
    --panel: #1C1E26;
    --panel-line: #2A2D3A;
    --text-main: #EDEDF2;
    --text-dim: #8A8D9C;
    --amber: #FF6B35;
    --amber-dim: #7A3A22;
    --cyan: #22D3EE;
    --today-ring: #FFB74D;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 0%, rgba(255,107,53,0.06), transparent 45%),
      radial-gradient(circle at 85% 100%, rgba(34,211,238,0.05), transparent 45%);
    color: var(--text-main);
    font-family: 'Space Grotesk', 'Pretendard', sans-serif;
    padding: 32px 16px 60px;
    min-height: 100vh;
  }

  #app{ max-width: 760px; margin: 0 auto; }

  /* ---- 헤더 ---- */
  .board-header{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 10px;
    margin-bottom: 26px;
    text-align:center;
  }

  .onair-badge{
    display:flex;
    align-items:center;
    gap:8px;
    background: rgba(255,107,53,0.1);
    border: 1px solid var(--amber-dim);
    padding: 5px 14px;
    border-radius: 999px;
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--amber);
  }
  .onair-dot{
    width:7px; height:7px; border-radius:50%;
    background: var(--amber);
    box-shadow: 0 0 8px var(--amber);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:.35; }
  }
  @media (prefers-reduced-motion: reduce){
    .onair-dot{ animation:none; }
  }

  .board-title{
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
    margin: 2px 0 4px;
  }

  .board-nav{
    display:flex;
    align-items:center;
    gap: 18px;
  }
  .month-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 15px;
    color: var(--text-dim);
    min-width: 90px;
    text-align:center;
  }
  .nav-btn{
    background: var(--panel);
    border: 1px solid var(--panel-line);
    color: var(--text-main);
    width: 30px; height: 30px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    line-height: 1;
  }
  .nav-btn:hover{ border-color: var(--amber); color: var(--amber); }
  .nav-btn:focus-visible{ outline: 2px solid var(--cyan); outline-offset: 2px; }

  /* ---- 상태 메시지 ---- */
  .status-msg{
    text-align:center;
    font-size: 13px;
    color: var(--text-dim);
    min-height: 18px;
    margin-bottom: 10px;
    font-family:'JetBrains Mono', monospace;
  }
  .status-msg.error{ color: #FF6B6B; }

  /* ---- 캘린더 ---- */
  .calendar-wrap{
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 16px;
    padding: 18px;
  }

  .weekday-row{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 6px;
  }
  .weekday{
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    padding: 6px 0;
    letter-spacing: 1px;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cell{
    min-height: 78px;
    border-radius: 10px;
    padding: 6px 5px;
    background: rgba(255,255,255,0.015);
    border: 1px solid transparent;
    display:flex;
    flex-direction:column;
    gap: 4px;
  }
  .cell.empty{ background: transparent; }
  .cell.today{
    border-color: var(--today-ring);
    box-shadow: inset 0 0 0 1px var(--today-ring);
  }

  .date-num{
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  .cell.today .date-num{
    color: var(--today-ring);
    font-weight: 700;
  }

  .event-chip{
    background: rgba(255,107,53,0.14);
    border-left: 2px solid var(--amber);
    color: var(--text-main);
    font-size: 10.5px;
    line-height: 1.3;
    padding: 3px 5px;
    border-radius: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .event-chip .time{
    color: var(--amber);
    font-family:'JetBrains Mono', monospace;
    margin-right: 3px;
  }
  .event-chip.more{
    background: transparent;
    border-left: none;
    color: var(--text-dim);
    font-family:'JetBrains Mono', monospace;
  }

  /* ---- 범례 / 푸터 ---- */
  .legend{
    display:flex;
    justify-content:center;
    align-items:center;
    gap: 4px;
    margin-top: 16px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .legend-dot{
    display:inline-block; width:8px; height:8px; border-radius:2px;
    background: var(--amber); margin-right: 4px;
  }
  .legend-today{
    display:inline-block; width:8px; height:8px; border-radius:2px;
    border: 1px solid var(--today-ring); margin-right: 4px;
  }

  .board-footer{
    text-align:center;
    margin-top: 22px;
    font-family:'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: #55586A;
  }

  @media (max-width: 480px){
    .board-title{ font-size: 22px; }
    .cell{ min-height: 60px; padding: 4px 3px; }
    .event-chip{ font-size: 9px; }
    .weekday{ font-size: 10px; }
  }
</style>

<script>
/* ==========================================================
   ⚙️ CONFIG — 이 부분만 본인 값으로 바꾸면 됩니다
   ========================================================== */
const CONFIG = {
  CALENDAR_ID: "hikim2684@gmail.com", // ← 본인 캘린더 ID
  API_KEY: "AIzaSyAj9Dds6gYQSHf85_41S7dcx-MghG9vVzo",                              // ← 본인 API 키
};
/* ========================================================== */

let currentDate = new Date();
let eventsCache = {}; // "YYYY-MM" -> events[]

const monthLabel = document.getElementById('monthLabel');
const grid = document.getElementById('calendarGrid');
const statusMsg = document.getElementById('statusMsg');
const syncTime = document.getElementById('syncTime');
const onairBadge = document.getElementById('onairBadge');

document.getElementById('prevBtn').addEventListener('click', () => changeMonth(-1));
document.getElementById('nextBtn').addEventListener('click', () => changeMonth(1));

function changeMonth(delta){
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + delta, 1);
  render();
}

function pad(n){ return String(n).padStart(2, '0'); }

async function fetchMonthEvents(year, month){
  const key = `${year}-${pad(month+1)}`;
  if (eventsCache[key]) return eventsCache[key];

  const timeMin = new Date(year, month, 1).toISOString();
  const timeMax = new Date(year, month + 1, 1).toISOString();

  const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CONFIG.CALENDAR_ID)}/events` +
    `?key=${CONFIG.API_KEY}&timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime&maxResults=250`;

  const res = await fetch(url);
  if (!res.ok){
    const body = await res.json().catch(() => ({}));
    throw new Error(body?.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  eventsCache[key] = data.items || [];
  return eventsCache[key];
}

function eventsByDay(events){
  const map = {};
  events.forEach(ev => {
    const start = ev.start?.dateTime || ev.start?.date;
    if (!start) return;
    const d = new Date(start);
    const dayKey = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    if (!map[dayKey]) map[dayKey] = [];
    map[dayKey].push(ev);
  });
  return map;
}

function isSameDay(a, b){
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

async function render(){
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  monthLabel.textContent = `${year} . ${pad(month+1)}`;
  statusMsg.textContent = '스케줄 불러오는 중…';
  statusMsg.classList.remove('error');
  grid.innerHTML = '';

  let events = [];
  try{
    events = await fetchMonthEvents(year, month);
    statusMsg.textContent = '';
    syncTime.textContent = new Date().toLocaleTimeString('ko-KR');
  }catch(err){
    statusMsg.textContent = `불러오기 실패: ${err.message} (CONFIG의 캘린더 ID / API 키를 확인해주세요)`;
    statusMsg.classList.add('error');
  }

  const byDay = eventsByDay(events);
  const today = new Date();

  const firstDay = new Date(year, month, 1);
  const startOffset = firstDay.getDay(); // 0=일요일
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  // 오늘이 이번 달이면 ON AIR 배지 표시
  const hasTodayEvents = isSameDay(today, new Date(year, month, today.getDate())) &&
    today.getFullYear()===year && today.getMonth()===month &&
    (byDay[`${year}-${pad(month+1)}-${pad(today.getDate())}`]?.length > 0);
  onairBadge.style.display = hasTodayEvents ? 'flex' : 'none';

  for (let i = 0; i < startOffset; i++){
    const cell = document.createElement('div');
    cell.className = 'cell empty';
    grid.appendChild(cell);
  }

  for (let day = 1; day <= daysInMonth; day++){
    const cell = document.createElement('div');
    const cellDate = new Date(year, month, day);
    cell.className = 'cell' + (isSameDay(cellDate, today) ? ' today' : '');

    const num = document.createElement('div');
    num.className = 'date-num';
    num.textContent = day;
    cell.appendChild(num);

    const dayKey = `${year}-${pad(month+1)}-${pad(day)}`;
    const dayEvents = byDay[dayKey] || [];

    dayEvents.slice(0, 2).forEach(ev => {
      const chip = document.createElement('div');
      chip.className = 'event-chip';
      const timeStr = ev.start?.dateTime
        ? new Date(ev.start.dateTime).toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', hour12:false})
        : '종일';
      chip.innerHTML = `<span class="time">${timeStr}</span>${escapeHtml(ev.summary || '(제목 없음)')}`;
      cell.appendChild(chip);
    });

    if (dayEvents.length > 2){
      const more = document.createElement('div');
      more.className = 'event-chip more';
      more.textContent = `+${dayEvents.length - 2}개 더`;
      cell.appendChild(more);
    }

    grid.appendChild(cell);
  }
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

render();
</script>
</body>
</html>
